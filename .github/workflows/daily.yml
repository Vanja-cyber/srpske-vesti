name: Дневни преглед вести

on:
  schedule:
    # GitHub користи UTC. 07:30 UTC = 09:30 у Београду (лето, CEST).
    # Зими (CET) ово постаје 08:30 — види README о летњем/зимском рачунању времена.
    - cron: "30 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dnevni-pregled
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Инсталирај зависности
        run: npm install --no-audit --no-fund

      - name: Направи и пошаљи преглед
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          WHATSAPP_PROVIDER: ${{ vars.WHATSAPP_PROVIDER }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          WHATSAPP_TEMPLATE: ${{ secrets.WHATSAPP_TEMPLATE }}
        run: node src/index.js

      - name: Сачувај резултате (docs/ + data/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs data
          git commit -m "Дневни преглед $(date +%F)" || echo "Нема промена за чување."
          git push
